
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AssicuraFacile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 100px 20px;
      margin: 0;
    }

    h1 {
      color: #2ecc71;
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #333;
      margin-bottom: 30px;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 260px;
      max-width: 90%;
    }

    button {
      background: #ff7a00;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 10px;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 40px 20px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AssicuraFacile</h1>
    <p>Controlla la targa e confronta assicurazioni in pochi secondi.</p>

    <input type="text" placeholder="Inserisci targa" />
    <button>Confronta</button>
  </div>
</body>
</html>
