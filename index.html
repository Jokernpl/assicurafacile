<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>AssicuraFacile</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

.box{
margin-top:100px;
background:white;
padding:40px;
border-radius:15px;
width:600px;
margin-left:auto;
margin-right:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
color:#2ecc71;
font-size:50px;
}

input{
padding:15px;
font-size:18px;
width:250px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff7a00;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.results{
display:none;
margin-top:40px;
}

.card{
background:white;
padding:20px;
margin:20px auto;
width:500px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.price{
font-size:30px;
color:#ff7a00;
font-weight:bold;
}

.pay{
background:#2ecc71;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<h1>AssicuraFacile</h1>

<p>Controlla la targa e confronta assicurazioni</p>

<input id="plate" placeholder="Inserisci targa">
<button onclick="search()">Confronta</button>

<div id="vehicle"></div>

</div>

<div id="results" class="results">

<div class="card">
<h2>Prima Assicurazioni</h2>
<div class="price">€389</div>
<p>RCA + assistenza stradale</p>
<button class="pay" onclick="pay()">Paga ora</button>
</div>

<div class="card">
<h2>Genertel</h2>
<div class="price">€420</div>
<p>RCA + furto incendio</p>
<button class="pay" onclick="pay()">Paga ora</button>
</div>

<div class="card">
<h2>ConTe.it</h2>
<div class="price">€460</div>
<p>RCA completa</p>
<button class="pay" onclick="pay()">Paga ora</button>
</div>

</div>

<script>

function search(){

let plate=document.getElementById("plate").value;

if(plate==""){
alert("Inserisci la targa");
return;
}

document.getElementById("vehicle").innerHTML=
"<h3>Veicolo trovato</h3> Fiat Panda 2021<br>Targa: "+plate.toUpperCase();

document.getElementById("results").style.display="block";

}

function pay(){

window.location.href="https://buy.stripe.com/test";

}

</script>

</body>
</html>
